name: 注册扩展（中文）
description: 注册插件或工作流到 registry
title: "[register] <kind>: <repo>"
labels: ["register-extension"]
body:
  - type: markdown
    attributes:
      value: |
        **只需填写 2 项：** 类型 + 仓库地址。
        所有元数据由同步脚本从仓库的 `meta.yaml` 自动提取。
        Registry 在 issue 关闭时更新（每日定时或手动触发）。

  - type: dropdown
    id: kind
    attributes:
      label: 类型
      options:
        - plugin
        - workflow
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: 仓库地址
      placeholder: https://github.com/example/jshook_plugin_demo
    validations:
      required: true
