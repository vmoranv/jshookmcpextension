name: 注册扩展（中文）
description: 注册或更新插件或工作流指针（中文模板；仅在 issue 关闭后同步）
title: "[register] <kind>: <repo>"
labels: ["register-extension"]
body:
  - type: markdown
    attributes:
      value: |
        审查通过后请关闭该 issue。Action 仅处理已关闭且带 `register-extension` 标签的 issue。
        只需填写 `Kind` 与 `Repository URL`，其余元信息由同步脚本自动推导。
        建议保留默认标题格式：`[register] <kind>: <repo>`。

  - type: markdown
    attributes:
      value: |
        ### 填写示例

        **插件示例**
        - 类型：`plugin`
        - 仓库地址：`https://github.com/example/jshook_plugin_demo`
        - 标题示例：`[register] plugin: https://github.com/example/jshook_plugin_demo`

        **工作流示例**
        - 类型：`workflow`
        - 仓库地址：`https://github.com/example/jshook_workflow_demo`
        - 标题示例：`[register] workflow: https://github.com/example/jshook_workflow_demo`

        **要求**
        - 仓库应可公开访问
        - 同步脚本会自动解析元信息

  - type: dropdown
    id: kind
    attributes:
      label: 类型
      description: 选择扩展类型
      options:
        - plugin
        - workflow
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: 仓库地址
      description: GitHub 仓库地址，例如插件仓库或工作流仓库
      placeholder: https://github.com/example/jshook_plugin_demo
    validations:
      required: true
