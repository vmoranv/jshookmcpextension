name: Register Extension (English)
description: Register a plugin/workflow for registry sync
title: "[register] <kind>: <repo>"
labels: ["register-extension"]
body:
  - type: markdown
    attributes:
      value: |
        **Only 2 fields required:** Kind + Repository URL.
        All metadata is auto-extracted from the repo's `meta.yaml` by the sync script.
        Registry updates happen on issue close (daily scheduled workflow or manual trigger).

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - plugin
        - workflow
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository URL
      placeholder: https://github.com/example/jshook_plugin_demo
    validations:
      required: true
