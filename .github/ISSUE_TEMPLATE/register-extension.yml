name: Register Extension Pointer
description: Register or update a plugin/workflow pointer (sync only after issue is closed)
title: "[register] <kind>: <repo>"
labels: ["register-extension"]
body:
  - type: markdown
    attributes:
      value: |
        审查通过后请关闭该 issue。Action 仅处理已关闭且带 `register-extension` 标签的 issue。
        仅 `Kind` + `Repository URL` 必填，其余字段可留空，由同步脚本自动补全。

  - type: dropdown
    id: kind
    attributes:
      label: Kind
      options:
        - plugin
        - workflow
    validations:
      required: true

  - type: input
    id: repository
    attributes:
      label: Repository URL
      description: GitHub repo URL
      placeholder: https://github.com/vmoranv/jshook_plugin_ida_bridge
    validations:
      required: true

  - type: input
    id: slug
    attributes:
      label: Slug (Optional)
      description: 留空时自动从仓库名推导，如 jshook_plugin_ida_bridge -> ida-bridge
      placeholder: ida-bridge

  - type: input
    id: extension_id
    attributes:
      label: Extension ID (Optional)
      description: 留空自动生成（plugin: io.github.<owner>.<slug>；workflow: workflow.<slug>.v1）
      placeholder: io.github.vmoranv.ida-bridge

  - type: input
    id: ref
    attributes:
      label: Git Ref (Optional)
      description: branch, tag, or commit，默认 main
      value: main

  - type: input
    id: subpath
    attributes:
      label: Subpath (Optional)
      description: 扩展根目录路径，默认 .
      value: .

  - type: input
    id: entry
    attributes:
      label: Entry File (Optional)
      description: plugin 默认 manifest.ts；workflow 默认 workflow.ts
      placeholder: manifest.ts
