name: Sync Extension Registry

on:
  issues:
    types: [closed]
  schedule:
    # 06:00 Asia/Shanghai = 22:00 UTC (previous day)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: ${{ github.event_name != 'issues' || contains(github.event.issue.labels.*.name, 'register-extension') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect closed register-extension issues
        id: collect
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              labels: 'register-extension',
              per_page: 100,
            });
            const simplified = issues.map((issue) => ({
              number: issue.number,
              title: issue.title,
              body: issue.body || '',
              labels: (issue.labels || []).map((label) =>
                typeof label === 'string' ? label : label?.name
              ).filter(Boolean),
              state_reason: issue.state_reason || '',
              created_at: issue.created_at || '',
              updated_at: issue.updated_at || '',
              closed_at: issue.closed_at || '',
            }));
            fs.writeFileSync('_closed_issues.json', JSON.stringify(simplified, null, 2));
            core.setOutput('count', String(simplified.length));

      - name: Sync index from issues
        run: node scripts/sync-index-from-issues.mjs --issues-file _closed_issues.json

      - name: Validate index
        run: node scripts/validate-index.mjs

      - name: Commit and push registry updates
        run: |
          if git diff --quiet -- registry/plugins.index.json registry/workflows.index.json; then
            echo "No registry changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/plugins.index.json registry/workflows.index.json
          git commit -m "chore(registry): sync pointers from register-extension issues"
          git push
